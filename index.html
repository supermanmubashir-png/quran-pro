<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quraan Pro</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<div class="header">
  <button onclick="openSidebar()">☰</button>
  <h1>Quraan Pro</h1>
  <button onclick="showHome()">🏠</button>
</div>

<!-- SIDEBAR -->
<div id="sidebar" class="sidebar">
  <h2>📖 Surahs</h2>
  <input placeholder="Search..." oninput="searchSurah(this.value)">
  <div id="sidebarSurahs"></div>

  <hr>
  <button onclick="showBookmarks()">⭐ Bookmarks</button>
  <button onclick="openSettings()">⚙️ Settings</button>
  <button onclick="showNamaz()">🕌 Namaz</button>
  <button onclick="showQibla()">🧭 Qibla</button>
</div>

<div id="overlay" onclick="closeSidebar()"></div>

<!-- PANELS -->
<div id="settingsPanel" class="panel hidden"></div>
<div id="namazPanel" class="panel hidden">
  <div id="namazTimes"></div>
</div>
<div id="qiblaPanel" class="panel hidden">
  <div id="compass">🧭</div>
</div>

<!-- MAIN -->
<div id="content"></div>
<!-- SETTINGS PANEL -->
<div id="settingsPanel" class="panel">
  <h2>⚙️ Settings</h2>
  <!-- 📖 TAFSIR PANEL -->
<div id="tafsirPanel" class="panel hidden"></div>

<!-- 🌍 TRANSLATION TOGGLE -->
<button onclick="toggleTranslation()" class="floatingBtn">🌍</button>

<!-- 🕌 NAMAZ PANEL -->
<div id="namazPanel" class="panel hidden"></div>

<!-- 🧭 QIBLA PANEL -->
<div id="qiblaPanel" class="panel hidden">
  <div id="compass">🧭</div>
</div>

<!-- QUICK ACCESS -->
<button onclick="showNamaz()" class="floatingBtn">🕌</button>
<button onclick="showQibla()" class="floatingBtn">🧭</button>

  <label>Reciter:</label>
  <select id="reciterSelect" onchange="changeReciter(this.value)">
    <option value="ar.alafasy">Alafasy</option>
    <option value="ar.abdulbasitmurattal">Abdul Basit</option>
  </select>

  <br><br>

  <button onclick="toggleDark()">🌙 Toggle Dark Mode</button>
  <button onclick="toggleAutoContinue()">⏭ Auto Continue</button>
  <button onclick="toggleLoopDefault()">🔁 Loop Default</button>
  <button onclick="toggleNotifications()">🔔 Notifications</button>

  <br><br>

  <label>Font Size:</label>
  <input type="range" min="18" max="40" value="24" onchange="changeFont(this.value)">

  <br><br>

  <button onclick="resetApp()">🧹 Reset App</button>
  <button onclick="closeSettings()">❌ Close</button>
</div>

<button onclick="openSettings()" class="settingsBtn">⚙️</button>

<script src="app.js"></script>
</body>
</html>
